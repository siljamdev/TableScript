name: Publish

on: workflow_dispatch

jobs:
  build-and-publish:
    permissions:
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 6.0.x

      - name: Build
        run: dotnet pack -c Release -o ./nupkg

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: siljam

      - name: Publish the package to Github
        run: dotnet nuget push ./nupkg/*.nupkg --source https://nuget.pkg.github.com/siljamdev/index.json --api-key "${{secrets.GITHUB_TOKEN}}"

      - name: Publish the package to Nuget
        run: dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key "${{steps.login.outputs.NUGET_API_KEY}}"