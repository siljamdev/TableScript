name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 6.0.x

    - name: Run tests
      run: |
        cd tests
        dotnet run --project tests/tests.csproj